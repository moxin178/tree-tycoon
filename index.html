<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>从砍树开始</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="game-ui">
    <div id="resource-bar">
      <span>💰 <span id="gold">0</span></span>
      <span>💎 <span id="diamonds">0</span></span>
      <span>🪵 <span id="wood">0</span></span>
      <span>🪵 <span id="planks">0</span></span>
      <span>🛋️ <span id="furniture">0</span></span>
      <span>👷 <span id="workers">0/0</span></span>
      <button id="build-btn">🏗️ 建造</button>
    </div>
    <div id="panel" class="hidden">
      <h3 id="panel-title"></h3>
      <div id="panel-content"></div>
      <button id="panel-close">关闭</button>
    </div>
    <div id="notification-area"></div>
  </div>
  <canvas id="game-canvas" width="800" height="600"></canvas>
  <script type="module" src="js/main.js"></script>
</body>
</html>
